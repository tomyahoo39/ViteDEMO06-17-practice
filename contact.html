<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聯絡我｜Mori Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.7.0/dist/aos.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-bg"></div>

  <nav class="navbar navbar-expand-lg py-3">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <span class="brand-mark">M</span>
        <span class="fw-semibold">Mori Studio</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
          <li class="nav-item"><a class="nav-link" href="index.html">首頁</a></li>
          <li class="nav-item"><a class="nav-link" href="projects.html">作品</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">關於我</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">聯絡</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="inner-page py-5">
    <div class="container">
      <div class="row g-5 align-items-start">
        <div class="col-lg-5" data-aos="fade-right">
          <span class="eyebrow">Contact</span>
          <h1 class="section-title">讓我們一起打造有故事的畫面</h1>
          <p class="mt-3">若你正在尋找插畫、視覺設計或品牌內容合作，我很樂意聽聽你的想法。</p>
          <div class="mt-4">
            <p class="contact-item"><i class="bi bi-envelope"></i> hello@mori-studio.com</p>
            <p class="contact-item"><i class="bi bi-instagram"></i> @mori.studio</p>
            <p class="contact-item"><i class="bi bi-behance"></i> behance.net/moristudio</p>
          </div>
        </div>
        <div class="col-lg-7" data-aos="fade-left">
          <div class="card-surface p-4">
            <form>
              <div class="mb-3">
                <label class="form-label">姓名</label>
                <input type="text" class="form-control" placeholder="你的名字">
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="your@email.com">
              </div>
              <div class="mb-3">
                <label class="form-label">專案類型</label>
                <input type="text" class="form-control" placeholder="品牌插畫 / 書籍封面 / 活動視覺">
              </div>
              <div class="mb-3">
                <label class="form-label">需求說明</label>
                <textarea class="form-control" rows="5" placeholder="請簡單描述你的想法與需求"></textarea>
              </div>
              <button class="btn btn-primary-custom">送出訊息</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container text-center">
      <p class="mb-0">© <span id="year"></span> Mori Studio</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.7.0/dist/aos.js"></script>
  <script src="script.js"></script>
</body>
</html>
